version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - ls -a
      - cd reserve-my-seat-app
      - echo "Installing dependencies..."
      - npm ci --legacy-peer-deps

  build:
    commands:
      - ls -a
      - echo "Building react app..."
      - npm run build

  post_build:
    commands:
      - ls -R reserve-my-seat-app/dist
      - ls -a

artifacts:
  files:
    - "**/*"
  base-directory: reserve-my-seat-app/dist
  discard-paths: no
